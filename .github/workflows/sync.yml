name: Sync Catalog from Registry

on:
  schedule:
    # Run once a week on Monday at 02:15 UTC
    - cron: "15 2 * * 1"
  workflow_dispatch:
    inputs:
      force_pull_request:
        description: "Force a Pull Request instead of direct push (default: direct-push when healthy)"
        required: false
        type: boolean
        default: false
      registry_base_url:
        description: "MCP Registry API base URL"
        required: false
        default: "https://registry.modelcontextprotocol.io"
      enable_github_enrichment:
        description: "Enable optional GitHub enrichment (experimental)"
        required: false
        type: boolean
        default: false
      github_source_repo:
        description: "GitHub repo for optional enrichment"
        required: false
        default: "https://github.com/modelcontextprotocol/servers"
      limit_servers:
        description: "Limit number of servers (0 = unlimited, for testing)"
        required: false
        default: "0"
      shrink_threshold_pct:
        description: "Refuse to push if active count drops below this percentage of the previous run (0 = disabled)"
        required: false
        default: "50"
      promote_tools:
        description: "Auto-promote each MCP server into a sibling tool entry"
        required: false
        type: boolean
        default: true
      promote_agents:
        description: "Auto-promote agent-signaling MCP servers into sibling agent entries"
        required: false
        type: boolean
        default: true
      auto_merge:
        description: "Automatically merge the resulting PR if direct-push falls back to PR mode"
        required: false
        type: boolean
        default: true

concurrency:
  group: sync-catalog-from-registry
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      EFFECTIVE_TOKEN: ${{ secrets.CATALOG_BOT_TOKEN || github.token }}
      REGISTRY_BASE_URL: ${{ inputs.registry_base_url || 'https://registry.modelcontextprotocol.io' }}
      GITHUB_SOURCE_REPO: ${{ inputs.github_source_repo || 'https://github.com/modelcontextprotocol/servers' }}
      LIMIT_SERVERS: ${{ inputs.limit_servers || '0' }}
      ENABLE_GITHUB_ENRICHMENT: ${{ inputs.enable_github_enrichment || false }}
      SHRINK_THRESHOLD_PCT: ${{ inputs.shrink_threshold_pct || '50' }}
      PROMOTE_TOOLS:  ${{ inputs.promote_tools  == 'false' && 'false' || 'true' }}
      PROMOTE_AGENTS: ${{ inputs.promote_agents == 'false' && 'false' || 'true' }}
      AUTO_MERGE:     ${{ inputs.auto_merge     == 'false' && 'false' || 'true' }}
      FORCE_PR:       ${{ inputs.force_pull_request == 'true' && 'true' || 'false' }}
      HUB_API:        https://api.matrixhub.io

    steps:
      - name: Checkout catalog
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ env.EFFECTIVE_TOKEN }}

      - name: Snapshot previous index for shrink-guard
        shell: bash
        run: |
          if [ -f index.json ]; then
            cp index.json /tmp/prev_index.json
            echo "Snapshotted previous index ($(jq -r '.counts.active_manifests // 0' /tmp/prev_index.json) active items)."
          else
            echo "No prior index.json — first sync, shrink-guard disabled for this run."
          fi

      - name: Checkout mcp_ingest tool
        uses: actions/checkout@v4
        with:
          repository: agent-matrix/mcp_ingest
          path: mcp_ingest_tool
          token: ${{ env.EFFECTIVE_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sync-catalog-${{ hashFiles('mcp_ingest_tool/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-sync-catalog-
            ${{ runner.os }}-pip-

      - name: Install mcp_ingest from source
        shell: bash
        run: |
          python -m pip install --upgrade pip
          cd mcp_ingest_tool
          pip install ".[harvester]"
          cd ..
          python -c "import mcp_ingest; print('✓ mcp_ingest installed successfully')"
          rm -rf mcp_ingest_tool

      - name: Harvest from MCP Registry
        shell: bash
        env:
          GITHUB_TOKEN: ${{ env.EFFECTIVE_TOKEN }}
        run: |
          echo "🔄 Harvesting from MCP Registry API..."
          echo "Registry: ${REGISTRY_BASE_URL}"
          echo "Promote tools: ${PROMOTE_TOOLS} | Promote agents: ${PROMOTE_AGENTS}"

          LIMIT_ARG=""
          if [ "${LIMIT_SERVERS}" != "0" ] && [ -n "${LIMIT_SERVERS}" ]; then
            LIMIT_ARG="--top ${LIMIT_SERVERS}"
          fi

          PROMOTE_ARGS=""
          if [ "${PROMOTE_TOOLS}" = "false" ]; then
            PROMOTE_ARGS="${PROMOTE_ARGS} --no-promote-tools"
          fi
          if [ "${PROMOTE_AGENTS}" = "false" ]; then
            PROMOTE_ARGS="${PROMOTE_ARGS} --no-promote-agents"
          fi

          mcp-ingest harvest-registry \
            --registry-base "${REGISTRY_BASE_URL}" \
            --out . \
            ${LIMIT_ARG} \
            ${PROMOTE_ARGS}

          echo "✅ Registry harvest complete"

      - name: Optional GitHub Enrichment
        if: ${{ env.ENABLE_GITHUB_ENRICHMENT == 'true' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ env.EFFECTIVE_TOKEN }}
        run: |
          echo "🔄 Running optional GitHub enrichment..."
          mcp-ingest harvest-source \
            "${GITHUB_SOURCE_REPO}" \
            --out ./github_enrichment \
            --base-only \
            -y
          echo "✅ GitHub enrichment complete"

      - name: Validate catalog index
        shell: bash
        run: |
          if [ ! -f index.json ]; then
            echo "::error::index.json missing after harvest — refusing to continue."
            exit 1
          fi
          python <<'PY'
          import json, sys
          idx = json.load(open("index.json"))
          assert "manifests" in idx or "items" in idx, "index.json has neither 'manifests' nor 'items'"
          counts = idx.get("counts", {})
          active = int(counts.get("active_manifests", 0))
          total  = int(counts.get("total_items", 0))
          by_type = counts.get("by_type", {}) or {}
          mcp_n  = int(by_type.get("mcp_server", 0))
          tool_n = int(by_type.get("tool", 0))
          agt_n  = int(by_type.get("agent", 0))
          print(f"✅ Index valid — active={active}, total={total}")
          print(f"   per-type:  mcp_server={mcp_n}  tool={tool_n}  agent={agt_n}")
          if active == 0:
              print("::error::Harvest produced 0 active manifests — refusing to push.")
              sys.exit(1)
          if mcp_n > 0 and tool_n == 0:
              print(
                  "::warning::Promotion produced 0 tool entries despite "
                  f"{mcp_n} mcp_servers. Tools tab on matrixhub.io will be "
                  "empty. PR will be opened for human review."
              )
          PY

      - name: Get catalog stats
        id: stats
        shell: bash
        run: |
          if [ -f index.json ]; then
            echo "total=$(jq -r '.counts.total_items // 0' index.json)"            >> "$GITHUB_OUTPUT"
            echo "active=$(jq -r '.counts.active_manifests // 0' index.json)"     >> "$GITHUB_OUTPUT"
            echo "deprecated=$(jq -r '.counts.deprecated // 0' index.json)"       >> "$GITHUB_OUTPUT"
            echo "mcp=$(jq -r '.counts.by_type.mcp_server // 0' index.json)"      >> "$GITHUB_OUTPUT"
            echo "tools=$(jq -r '.counts.by_type.tool // 0' index.json)"          >> "$GITHUB_OUTPUT"
            echo "agents=$(jq -r '.counts.by_type.agent // 0' index.json)"        >> "$GITHUB_OUTPUT"
          else
            echo "total=0"      >> "$GITHUB_OUTPUT"
            echo "active=0"     >> "$GITHUB_OUTPUT"
            echo "deprecated=0" >> "$GITHUB_OUTPUT"
            echo "mcp=0"        >> "$GITHUB_OUTPUT"
            echo "tools=0"      >> "$GITHUB_OUTPUT"
            echo "agents=0"     >> "$GITHUB_OUTPUT"
          fi

      - name: Shrink-guard (refuse a sudden catalog collapse)
        shell: bash
        run: |
          NEW_ACTIVE="${{ steps.stats.outputs.active }}"
          THRESHOLD_PCT="${SHRINK_THRESHOLD_PCT:-50}"
          if [ "${THRESHOLD_PCT}" = "0" ]; then
            echo "Shrink-guard disabled (shrink_threshold_pct=0)."
            exit 0
          fi
          if [ ! -f /tmp/prev_index.json ]; then
            echo "No previous index — shrink-guard skipped on first sync."
            exit 0
          fi
          OLD_ACTIVE=$(jq -r '.counts.active_manifests // 0' /tmp/prev_index.json)
          if [ "${OLD_ACTIVE}" -lt 100 ]; then
            echo "Previous active=${OLD_ACTIVE} < 100; bootstrap mode, shrink-guard skipped."
            exit 0
          fi
          MIN_ALLOWED=$(( OLD_ACTIVE * THRESHOLD_PCT / 100 ))
          if [ "${NEW_ACTIVE}" -lt "${MIN_ALLOWED}" ]; then
            echo "::error::Catalog shrank from ${OLD_ACTIVE} → ${NEW_ACTIVE} active items (< ${THRESHOLD_PCT}% threshold). Refusing to push."
            echo "::error::If this drop is intentional, re-run with shrink_threshold_pct=0."
            exit 1
          fi
          echo "OK: ${OLD_ACTIVE} → ${NEW_ACTIVE} active items (>= ${THRESHOLD_PCT}% retained)."

      - name: Check for changes
        id: changes
        shell: bash
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ship catalog update (direct push or PR + auto-merge)
        if: steps.changes.outputs.has_changes == 'true'
        id: ship
        shell: bash
        env:
          GH_TOKEN: ${{ env.EFFECTIVE_TOKEN }}
          TOOLS:  ${{ steps.stats.outputs.tools }}
          AGENTS: ${{ steps.stats.outputs.agents }}
          MCP:    ${{ steps.stats.outputs.mcp }}
          ACTIVE: ${{ steps.stats.outputs.active }}
          TOTAL:  ${{ steps.stats.outputs.total }}
          DEPRECATED: ${{ steps.stats.outputs.deprecated }}
          EVENT:  ${{ github.event_name }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          COMMIT_MSG="chore(sync): catalog update (active=${ACTIVE} mcp=${MCP} tools=${TOOLS} agents=${AGENTS})"
          git commit -m "${COMMIT_MSG}"

          HEALTHY="true"
          if [ "${TOOLS}" = "0" ] || [ "${AGENTS}" = "0" ]; then
            HEALTHY="false"
          fi

          if [ "${HEALTHY}" != "true" ]; then
            MODE="pr-review"; REASON="tools=${TOOLS} or agents=${AGENTS} — unhealthy, needs human review"
          elif [ "${FORCE_PR}" = "true" ]; then
            MODE="pr-explicit"; REASON="operator set force_pull_request=true"
          elif [ "${AUTO_MERGE}" != "true" ]; then
            MODE="pr-no-automerge"; REASON="operator set auto_merge=false"
          else
            MODE="direct"; REASON="healthy promotion + auto_merge — full automation"
          fi
          echo "Strategy: ${MODE} (${REASON})"

          PREV_ACTIVE="(none)"
          PREV_MCP="-"; PREV_TOOLS="-"; PREV_AGENTS="-"
          if [ -f /tmp/prev_index.json ]; then
            PREV_ACTIVE=$(jq -r '.counts.active_manifests // 0' /tmp/prev_index.json)
            PREV_MCP=$(jq -r '.counts.by_type.mcp_server // 0' /tmp/prev_index.json)
            PREV_TOOLS=$(jq -r '.counts.by_type.tool // 0' /tmp/prev_index.json)
            PREV_AGENTS=$(jq -r '.counts.by_type.agent // 0' /tmp/prev_index.json)
          fi
          cat > /tmp/pr_body.md <<EOF
          ## Automated Catalog Sync

          | metric | before | after |
          |---|---|---|
          | active_manifests | ${PREV_ACTIVE} | ${ACTIVE} |
          | total_items      | -              | ${TOTAL}  |
          | deprecated       | -              | ${DEPRECATED} |
          | **mcp_server**   | ${PREV_MCP}    | ${MCP}    |
          | **tool**         | ${PREV_TOOLS}  | ${TOOLS}  |
          | **agent**        | ${PREV_AGENTS} | ${AGENTS} |

          Triggered by: \`${EVENT}\`
          Registry: \`${REGISTRY_BASE_URL}\`
          Promotion: tools=\`${PROMOTE_TOOLS}\` agents=\`${PROMOTE_AGENTS}\`
          Strategy: \`${MODE}\` — ${REASON}
          EOF

          open_pr() {
            local title="$1"; local extra_body="$2"
            local branch="sync/registry-$(date -u +%Y%m%d-%H%M%S)"
            git checkout -b "$branch"
            git push origin "$branch"
            if [ -n "$extra_body" ]; then
              echo "" >> /tmp/pr_body.md
              echo "$extra_body" >> /tmp/pr_body.md
            fi
            gh pr create --base main --head "$branch" --title "$title" --body-file /tmp/pr_body.md
          }

          try_merge() {
            local pr_url="$1"
            echo "Attempting auto-merge on ${pr_url}"
            set +e
            gh pr merge --auto --squash --delete-branch "${pr_url}" 2>/tmp/merge_err.log
            local rc=$?; set -e
            if [ $rc -eq 0 ]; then echo "✅ Auto-merge armed"; return 0; fi
            cat /tmp/merge_err.log
            echo "⚠️ Auto-merge unavailable. Trying immediate squash merge."
            set +e
            gh pr merge --squash --delete-branch "${pr_url}" 2>/tmp/merge_err.log
            local rc2=$?; set -e
            if [ $rc2 -eq 0 ]; then echo "✅ Immediate squash merge succeeded."; return 0; fi
            echo "⚠️ Both merge attempts failed:"; cat /tmp/merge_err.log
            echo "   PR left open at ${pr_url}"
            return 1
          }

          case "${MODE}" in
            direct)
              echo "Pushing directly to main…"
              set +e
              git push origin HEAD:main 2>/tmp/push_err.log
              PUSH_RC=$?; set -e
              if [ $PUSH_RC -eq 0 ]; then
                echo "✅ Direct push to main succeeded — fully automated."
                echo "mode=direct" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "::warning::Direct push to main was blocked."
              cat /tmp/push_err.log
              echo "::warning::Falling back to PR + auto-merge."
              PR_URL=$(open_pr "chore(sync): catalog update (mcp=${MCP} tools=${TOOLS} agents=${AGENTS})" "_Direct push blocked; falling back to PR with auto-merge._")
              echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
              echo "mode=pr-fallback" >> "$GITHUB_OUTPUT"
              try_merge "${PR_URL}" || true
              ;;
            pr-explicit|pr-no-automerge)
              PR_URL=$(open_pr "chore(sync): catalog update (mcp=${MCP} tools=${TOOLS} agents=${AGENTS})" "")
              echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
              echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
              if [ "${MODE}" = "pr-explicit" ] && [ "${AUTO_MERGE}" = "true" ]; then
                try_merge "${PR_URL}" || true
              fi
              ;;
            pr-review)
              PR_URL=$(open_pr "chore(sync): catalog update (mcp=${MCP} tools=${TOOLS} agents=${AGENTS}) — NEEDS REVIEW" $'\n⚠️ **Promotion produced empty buckets.** This PR is left open for human review. Merging it would empty the Tools and/or Agents tabs on matrixhub.io.')
              echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
              echo "mode=pr-review" >> "$GITHUB_OUTPUT"
              gh pr edit "${PR_URL}" --add-label "needs-review,promotion-empty" || true
              gh pr comment "${PR_URL}" --body "⚠️ Auto-merge skipped — promotion produced tools=${TOOLS} and agents=${AGENTS}. Human review required." || true
              ;;
          esac

      # ----------------------------------------------------------------------
      # NOTIFY MATRIX-HUB — close the automation chain to the live DB.
      #
      # The catalog has just been updated on main. matrix-hub serves
      # api.matrixhub.io and reads catalog/main/index.json on its own
      # schedule, but we don't want to wait for that.
      #
      # Two notifications:
      #   1. POST /remotes/sync on api.matrixhub.io — unauthenticated,
      #      kicks the Hub's runtime ingest path. Updates Aiven via the
      #      Hub's own machinery within minutes.
      #   2. repository_dispatch event to agent-matrix/matrixhub-db with
      #      event_type=catalog-updated — fires aiven-populate.yml which
      #      runs the standalone populator script (separate path, belt
      #      and suspenders). Requires CATALOG_BOT_TOKEN with repo scope
      #      on matrixhub-db. If the secret isn't present, this step
      #      logs a warning and continues — it's optional.
      # ----------------------------------------------------------------------
      - name: Notify matrix-hub to re-ingest catalog
        if: |
          steps.changes.outputs.has_changes == 'true'
          && (steps.ship.outputs.mode == 'direct' || steps.ship.outputs.mode == 'pr-fallback' || steps.ship.outputs.mode == 'pr-explicit')
        shell: bash
        env:
          GH_TOKEN: ${{ env.EFFECTIVE_TOKEN }}
          MCP:    ${{ steps.stats.outputs.mcp }}
          TOOLS:  ${{ steps.stats.outputs.tools }}
          AGENTS: ${{ steps.stats.outputs.agents }}
          ACTIVE: ${{ steps.stats.outputs.active }}
        run: |
          # 1) Trigger Hub's runtime ingest (no auth required).
          echo "→ POST ${HUB_API}/remotes/sync"
          set +e
          RESP=$(curl -fsSL --max-time 30 -X POST "${HUB_API}/remotes/sync" 2>&1)
          RC=$?
          set -e
          if [ $RC -eq 0 ]; then
            JOB_ID=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('job_id',''))" 2>/dev/null || true)
            if [ -n "$JOB_ID" ]; then
              echo "✅ Hub re-ingest job: $JOB_ID"
              echo "   Status: ${HUB_API}/remotes/sync/$JOB_ID"
            else
              echo "✅ Hub responded: $RESP"
            fi
          else
            echo "::warning::Hub ping failed (rc=$RC): $RESP"
            echo "::warning::Aiven will still update via the weekly aiven-populate.yml schedule."
          fi

          # 2) Fire repository_dispatch to matrixhub-db so aiven-populate.yml
          #    runs the standalone populator. Optional path; needs a PAT that
          #    has write access to matrixhub-db (CATALOG_BOT_TOKEN typically).
          if [ -z "${EFFECTIVE_TOKEN}" ] || [ "${EFFECTIVE_TOKEN}" = "${{ github.token }}" ]; then
            echo "::notice::Skipping repository_dispatch — default GITHUB_TOKEN can't fire dispatches to other repos. Set CATALOG_BOT_TOKEN secret to enable."
          else
            echo "→ POST repository_dispatch catalog-updated → agent-matrix/matrixhub-db"
            set +e
            gh api -X POST /repos/agent-matrix/matrixhub-db/dispatches \
              -f event_type=catalog-updated \
              -F "client_payload[mcp]=${MCP}" \
              -F "client_payload[tools]=${TOOLS}" \
              -F "client_payload[agents]=${AGENTS}" \
              -F "client_payload[active]=${ACTIVE}" 2>/tmp/dispatch.log
            RC=$?
            set -e
            if [ $RC -eq 0 ]; then
              echo "✅ repository_dispatch sent."
            else
              echo "::warning::repository_dispatch failed:"
              cat /tmp/dispatch.log
            fi
          fi

      - name: Summary
        if: always() && steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          {
            echo "### Catalog sync result"
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| mode | \`${{ steps.ship.outputs.mode || 'unknown' }}\` |"
            echo "| mcp_server | ${{ steps.stats.outputs.mcp }} |"
            echo "| tool | ${{ steps.stats.outputs.tools }} |"
            echo "| agent | ${{ steps.stats.outputs.agents }} |"
            echo "| active | ${{ steps.stats.outputs.active }} |"
            if [ -n "${{ steps.ship.outputs.pr_url }}" ]; then
              echo "| pr | ${{ steps.ship.outputs.pr_url }} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure summary
        if: failure()
        shell: bash
        run: |
          {
            echo "### ❌ Catalog sync failed"
            echo ""
            echo "Registry: \`${REGISTRY_BASE_URL}\`"
            echo "Trigger : \`${{ github.event_name }}\`"
            echo ""
            echo "Common causes:"
            echo "- Registry API outage or schema change"
            echo "- Shrink-guard tripped"
            echo "- mcp_ingest install failed"
            echo "- Branch protection on main + no CATALOG_BOT_TOKEN with bypass perms"
          } >> "$GITHUB_STEP_SUMMARY"
