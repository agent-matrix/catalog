name: Sync Catalog from Registry

on:
  schedule:
    # Run once a week on Monday at 02:15 UTC
    - cron: "15 2 * * 1"
  workflow_dispatch:
    inputs:
      force_pull_request:
        description: "Force a Pull Request instead of direct push"
        required: false
        type: boolean
        default: false
      registry_base_url:
        description: "MCP Registry API base URL"
        required: false
        default: "https://registry.modelcontextprotocol.io"
      enable_github_enrichment:
        description: "Enable optional GitHub enrichment (experimental)"
        required: false
        type: boolean
        default: false
      github_source_repo:
        description: "GitHub repo for optional enrichment"
        required: false
        default: "https://github.com/modelcontextprotocol/servers"
      limit_servers:
        description: "Limit number of servers (0 = unlimited, for testing)"
        required: false
        default: "0"
      shrink_threshold_pct:
        description: "Refuse to push if active count drops below this percentage of the previous run (0 = disabled)"
        required: false
        default: "50"
      promote_tools:
        description: "Auto-promote each MCP server into a sibling tool entry"
        required: false
        type: boolean
        default: true
      promote_agents:
        description: "Auto-promote agent-signaling MCP servers into sibling agent entries"
        required: false
        type: boolean
        default: true
      auto_merge:
        description: "Enable auto-merge on the resulting PR if promotion looks healthy (tools>0 AND agents>0)"
        required: false
        type: boolean
        default: true

concurrency:
  group: sync-catalog-from-registry
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      EFFECTIVE_TOKEN: ${{ secrets.CATALOG_BOT_TOKEN || github.token }}
      REGISTRY_BASE_URL: ${{ inputs.registry_base_url || 'https://registry.modelcontextprotocol.io' }}
      GITHUB_SOURCE_REPO: ${{ inputs.github_source_repo || 'https://github.com/modelcontextprotocol/servers' }}
      LIMIT_SERVERS: ${{ inputs.limit_servers || '0' }}
      ENABLE_GITHUB_ENRICHMENT: ${{ inputs.enable_github_enrichment || false }}
      # Default to PR mode for scheduled runs (safer); manual runs can flip via input.
      FORCE_PR: ${{ inputs.force_pull_request || (github.event_name == 'schedule') }}
      SHRINK_THRESHOLD_PCT: ${{ inputs.shrink_threshold_pct || '50' }}
      # Promotion is on by default so the Tools and Agents tabs on
      # matrixhub.io stay populated. Operators can disable per run via
      # workflow_dispatch inputs above.
      #
      # BUGFIX: previous expression compared inputs.promote_tools to boolean
      # `false`. On scheduled runs the input is null, and `null == false`
      # evaluates to true in GitHub Actions expression syntax, so scheduled
      # runs disabled promotion -- the OPPOSITE of the intended default.
      # Comparing to the literal STRING 'false' fixes it for both
      # scheduled (null) and manual-dispatch (true/false boolean) triggers.
      PROMOTE_TOOLS:  ${{ inputs.promote_tools  == 'false' && 'false' || 'true' }}
      PROMOTE_AGENTS: ${{ inputs.promote_agents == 'false' && 'false' || 'true' }}
      AUTO_MERGE:     ${{ inputs.auto_merge     == 'false' && 'false' || 'true' }}

    steps:
      - name: Checkout catalog
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ env.EFFECTIVE_TOKEN }}

      - name: Snapshot previous index for shrink-guard
        shell: bash
        run: |
          if [ -f index.json ]; then
            cp index.json /tmp/prev_index.json
            echo "Snapshotted previous index ($(jq -r '.counts.active_manifests // 0' /tmp/prev_index.json) active items)."
          else
            echo "No prior index.json — first sync, shrink-guard disabled for this run."
          fi

      - name: Checkout mcp_ingest tool
        uses: actions/checkout@v4
        with:
          repository: agent-matrix/mcp_ingest
          path: mcp_ingest_tool
          token: ${{ env.EFFECTIVE_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sync-catalog-${{ hashFiles('mcp_ingest_tool/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-sync-catalog-
            ${{ runner.os }}-pip-

      - name: Install mcp_ingest from source
        shell: bash
        run: |
          python -m pip install --upgrade pip
          cd mcp_ingest_tool
          # Install with the harvester extras only (skip [dev]); jsonschema/httpx
          # come in transitively, no need to pre-install them.
          pip install ".[harvester]"
          cd ..
          python -c "import mcp_ingest; print('✓ mcp_ingest installed successfully')"
          # Remove tool folder so it isn't accidentally committed.
          rm -rf mcp_ingest_tool

      - name: Harvest from MCP Registry
        shell: bash
        env:
          GITHUB_TOKEN: ${{ env.EFFECTIVE_TOKEN }}
        run: |
          echo "🔄 Harvesting from MCP Registry API..."
          echo "Registry: ${REGISTRY_BASE_URL}"
          echo "Promote tools: ${PROMOTE_TOOLS} | Promote agents: ${PROMOTE_AGENTS}"

          # BUGFIX: previously this step had an unconditional `--limit 10`
          # that capped every scheduled run to 10 servers and would have
          # shrunk the live catalog from ~7466 to 10 on the next Monday.
          # The conditional `--top N` from inputs.limit_servers is the
          # ONLY limit honoured now.
          LIMIT_ARG=""
          if [ "${LIMIT_SERVERS}" != "0" ] && [ -n "${LIMIT_SERVERS}" ]; then
            LIMIT_ARG="--top ${LIMIT_SERVERS}"
          fi

          PROMOTE_ARGS=""
          if [ "${PROMOTE_TOOLS}" = "false" ]; then
            PROMOTE_ARGS="${PROMOTE_ARGS} --no-promote-tools"
          fi
          if [ "${PROMOTE_AGENTS}" = "false" ]; then
            PROMOTE_ARGS="${PROMOTE_ARGS} --no-promote-agents"
          fi

          mcp-ingest harvest-registry \
            --registry-base "${REGISTRY_BASE_URL}" \
            --out . \
            ${LIMIT_ARG} \
            ${PROMOTE_ARGS}

          echo "✅ Registry harvest complete"

      - name: Optional GitHub Enrichment
        if: ${{ env.ENABLE_GITHUB_ENRICHMENT == 'true' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ env.EFFECTIVE_TOKEN }}
        run: |
          echo "🔄 Running optional GitHub enrichment..."
          mcp-ingest harvest-source \
            "${GITHUB_SOURCE_REPO}" \
            --out ./github_enrichment \
            --base-only \
            -y
          echo "✅ GitHub enrichment complete"
          # NOTE: today's enrichment output is not merged into index.json.
          # If/when we wire it in, remove this comment and document the merge step.

      - name: Validate catalog index
        shell: bash
        run: |
          if [ ! -f index.json ]; then
            echo "::error::index.json missing after harvest — refusing to continue."
            exit 1
          fi
          python <<'PY'
          import json, sys
          idx = json.load(open("index.json"))
          assert "manifests" in idx or "items" in idx, "index.json has neither 'manifests' nor 'items'"
          counts = idx.get("counts", {})
          active = int(counts.get("active_manifests", 0))
          total  = int(counts.get("total_items", 0))
          by_type = counts.get("by_type", {}) or {}
          mcp_n  = int(by_type.get("mcp_server", 0))
          tool_n = int(by_type.get("tool", 0))
          agt_n  = int(by_type.get("agent", 0))
          print(f"✅ Index valid — active={active}, total={total}")
          print(f"   per-type:  mcp_server={mcp_n}  tool={tool_n}  agent={agt_n}")
          if active == 0:
              print("::error::Harvest produced 0 active manifests — refusing to push.")
              sys.exit(1)
          # Promotion sanity: if mcp servers exist but tools is zero, the
          # promotion pipeline regressed. Don't push a catalog that would
          # leave the MatrixHub Tools tab empty.
          if mcp_n > 0 and tool_n == 0:
              print(
                  "::warning::Promotion produced 0 tool entries despite "
                  f"{mcp_n} mcp_servers. Tools tab on matrixhub.io will be "
                  "empty. Check that mcp_ingest is at a recent enough version."
              )
          PY

      - name: Get catalog stats
        id: stats
        shell: bash
        run: |
          if [ -f index.json ]; then
            echo "total=$(jq -r '.counts.total_items // 0' index.json)"            >> "$GITHUB_OUTPUT"
            echo "active=$(jq -r '.counts.active_manifests // 0' index.json)"     >> "$GITHUB_OUTPUT"
            echo "deprecated=$(jq -r '.counts.deprecated // 0' index.json)"       >> "$GITHUB_OUTPUT"
            echo "mcp=$(jq -r '.counts.by_type.mcp_server // 0' index.json)"      >> "$GITHUB_OUTPUT"
            echo "tools=$(jq -r '.counts.by_type.tool // 0' index.json)"          >> "$GITHUB_OUTPUT"
            echo "agents=$(jq -r '.counts.by_type.agent // 0' index.json)"        >> "$GITHUB_OUTPUT"
          else
            echo "total=0"      >> "$GITHUB_OUTPUT"
            echo "active=0"     >> "$GITHUB_OUTPUT"
            echo "deprecated=0" >> "$GITHUB_OUTPUT"
            echo "mcp=0"        >> "$GITHUB_OUTPUT"
            echo "tools=0"      >> "$GITHUB_OUTPUT"
            echo "agents=0"     >> "$GITHUB_OUTPUT"
          fi

      - name: Shrink-guard (refuse a sudden catalog collapse)
        shell: bash
        run: |
          NEW_ACTIVE="${{ steps.stats.outputs.active }}"
          THRESHOLD_PCT="${SHRINK_THRESHOLD_PCT:-50}"

          if [ "${THRESHOLD_PCT}" = "0" ]; then
            echo "Shrink-guard disabled (shrink_threshold_pct=0)."
            exit 0
          fi
          if [ ! -f /tmp/prev_index.json ]; then
            echo "No previous index — shrink-guard skipped on first sync."
            exit 0
          fi

          OLD_ACTIVE=$(jq -r '.counts.active_manifests // 0' /tmp/prev_index.json)

          # Only enforce the guard when the previous count was non-trivial
          # (>= 100). Below that we're still bootstrapping.
          if [ "${OLD_ACTIVE}" -lt 100 ]; then
            echo "Previous active=${OLD_ACTIVE} < 100; bootstrap mode, shrink-guard skipped."
            exit 0
          fi

          MIN_ALLOWED=$(( OLD_ACTIVE * THRESHOLD_PCT / 100 ))
          if [ "${NEW_ACTIVE}" -lt "${MIN_ALLOWED}" ]; then
            echo "::error::Catalog shrank from ${OLD_ACTIVE} → ${NEW_ACTIVE} active items (< ${THRESHOLD_PCT}% threshold). Refusing to push."
            echo "::error::If this drop is intentional, re-run with shrink_threshold_pct=0."
            exit 1
          fi
          echo "OK: ${OLD_ACTIVE} → ${NEW_ACTIVE} active items (>= ${THRESHOLD_PCT}% retained)."

      - name: Check for changes
        id: changes
        shell: bash
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      # OPTION 1: Direct Push — only when explicitly chosen via manual dispatch.
      - name: Commit and Push (Direct)
        if: steps.changes.outputs.has_changes == 'true' && env.FORCE_PR != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(sync): catalog update (active=${{ steps.stats.outputs.active }} mcp=${{ steps.stats.outputs.mcp }} tools=${{ steps.stats.outputs.tools }} agents=${{ steps.stats.outputs.agents }})"
          git push

      # OPTION 2: Create Pull Request — DEFAULT for scheduled runs.
      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true' && env.FORCE_PR == 'true'
        id: createpr
        shell: bash
        env:
          GH_TOKEN: ${{ env.EFFECTIVE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="sync/registry-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"

          git add -A
          git commit -m "chore(sync): catalog update from MCP Registry"
          git push origin "$BRANCH"

          PREV_ACTIVE="(none)"
          PREV_MCP="-"; PREV_TOOLS="-"; PREV_AGENTS="-"
          if [ -f /tmp/prev_index.json ]; then
            PREV_ACTIVE=$(jq -r '.counts.active_manifests // 0' /tmp/prev_index.json)
            PREV_MCP=$(jq -r '.counts.by_type.mcp_server // 0' /tmp/prev_index.json)
            PREV_TOOLS=$(jq -r '.counts.by_type.tool // 0' /tmp/prev_index.json)
            PREV_AGENTS=$(jq -r '.counts.by_type.agent // 0' /tmp/prev_index.json)
          fi
          cat > /tmp/pr_body.md <<EOF
          ## Automated Catalog Sync

          | metric | before | after |
          |---|---|---|
          | active_manifests | ${PREV_ACTIVE} | ${{ steps.stats.outputs.active }} |
          | total_items      | -              | ${{ steps.stats.outputs.total }}  |
          | deprecated       | -              | ${{ steps.stats.outputs.deprecated }} |
          | **mcp_server**   | ${PREV_MCP}    | ${{ steps.stats.outputs.mcp }}    |
          | **tool**         | ${PREV_TOOLS}  | ${{ steps.stats.outputs.tools }}  |
          | **agent**        | ${PREV_AGENTS} | ${{ steps.stats.outputs.agents }} |

          Triggered by: \`${{ github.event_name }}\`
          Registry: \`${{ env.REGISTRY_BASE_URL }}\`
          Promotion: tools=\`${PROMOTE_TOOLS}\` agents=\`${PROMOTE_AGENTS}\`

          The \`tool\` and \`agent\` rows above feed the matrixhub.io
          homepage tabs. If either drops to 0, this PR will NOT auto-merge
          and must be reviewed by a human.
          EOF

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(sync): catalog update (mcp=${{ steps.stats.outputs.mcp }} tools=${{ steps.stats.outputs.tools }} agents=${{ steps.stats.outputs.agents }})" \
            --body-file /tmp/pr_body.md)
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"

      # OPTION 2b: Enable auto-merge only when promotion produced healthy counts.
      # If tools or agents collapsed to 0, the PR stays open for a human to review.
      - name: Enable auto-merge (only if tools>0 AND agents>0)
        if: |
          steps.changes.outputs.has_changes == 'true'
          && env.FORCE_PR == 'true'
          && env.AUTO_MERGE == 'true'
          && steps.stats.outputs.tools  != '0'
          && steps.stats.outputs.agents != '0'
          && steps.createpr.outputs.pr_url != ''
        shell: bash
        env:
          GH_TOKEN: ${{ env.EFFECTIVE_TOKEN }}
        run: |
          echo "Enabling auto-merge on ${{ steps.createpr.outputs.pr_url }}"
          gh pr merge --auto --squash "${{ steps.createpr.outputs.pr_url }}"

      - name: Flag PR for human review (tools=0 or agents=0)
        if: |
          steps.changes.outputs.has_changes == 'true'
          && env.FORCE_PR == 'true'
          && (steps.stats.outputs.tools == '0' || steps.stats.outputs.agents == '0')
          && steps.createpr.outputs.pr_url != ''
        shell: bash
        env:
          GH_TOKEN: ${{ env.EFFECTIVE_TOKEN }}
        run: |
          echo "::warning::tools=${{ steps.stats.outputs.tools }} agents=${{ steps.stats.outputs.agents }} — PR left open for human review"
          gh pr edit "${{ steps.createpr.outputs.pr_url }}" --add-label "needs-review,promotion-empty" || true
          gh pr comment "${{ steps.createpr.outputs.pr_url }}" --body $'⚠️ **Auto-merge skipped** — promotion produced `tools=${{ steps.stats.outputs.tools }}` and `agents=${{ steps.stats.outputs.agents }}`.\n\nMerging this PR would empty the Tools and/or Agents tabs on matrixhub.io. A human must review and either merge intentionally or close this PR and re-run the workflow with promotion enabled.' || true

      # Surface failure clearly in the Actions UI for scheduled runs.
      - name: Failure summary
        if: failure()
        shell: bash
        run: |
          {
            echo "### ❌ Catalog sync failed"
            echo ""
            echo "Registry: \`${REGISTRY_BASE_URL}\`"
            echo "Trigger : \`${{ github.event_name }}\`"
            echo ""
            echo "Common causes:"
            echo "- Registry API outage or schema change"
            echo "- Shrink-guard tripped (active count dropped > ${SHRINK_THRESHOLD_PCT:-50}%)"
            echo "- mcp_ingest install failed (check the Install step logs)"
          } >> "$GITHUB_STEP_SUMMARY"
